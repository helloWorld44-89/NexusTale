# Production inventory — populate the IP from `terraform output server_ip`
# before running deploy-prod.yml.
#
# The deploy-prod.yml playbook also accepts prod_vm_host as an extra-var,
# which overrides this inventory. The `ansible_run_command` Terraform output
# generates the full command with the correct IP pre-filled.
#
# Example (replace 1.2.3.4 with actual IP):
#
#   [prod]
#   1.2.3.4 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_ed25519

[prod]
# PROD_SERVER_IP ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_ed25519
