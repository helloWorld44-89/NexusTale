# Self-hosting compose file — pulls prebuilt public images from GHCR.
# No build step, no bundled TLS/reverse proxy: put your own in front
# (Nginx Proxy Manager, Caddy, Traefik, Cloudflare Tunnel, ...) if you want
# to expose this beyond your local network. See README.md "Self-hosting".
#
# Quick start:
#   cp .env.selfhost.example .env
#   # fill in the "required" section below with generated secrets
#   docker compose -f docker-compose.selfhost.yml --env-file .env up -d
#
# Update to the newest image for your pinned NEXUSTALE_VERSION:
#   docker compose -f docker-compose.selfhost.yml --env-file .env pull
#   docker compose -f docker-compose.selfhost.yml --env-file .env up -d

services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexustale
      POSTGRES_PASSWORD: ${NEXUSTALE_DB_PASSWORD}
      POSTGRES_DB: nexustale
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexustale"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${NEXUSTALE_MINIO_ACCESSKEY}
      MINIO_ROOT_PASSWORD: ${NEXUSTALE_MINIO_SECRETKEY}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/helloworld44-89/nexustale/api:${NEXUSTALE_VERSION:-latest}
    restart: unless-stopped
    environment:
      NEXUSTALE_SERVER_PORT: "8080"
      # debug by default so a fresh install never crash-loops on
      # ValidateProd's strict checks; switch to "release" once you've set a
      # real NEXUSTALE_ALLOWEDORIGIN behind your own reverse proxy/domain.
      NEXUSTALE_SERVER_MODE: "${NEXUSTALE_SERVER_MODE:-debug}"
      NEXUSTALE_SERVER_ALLOWEDORIGIN: "${NEXUSTALE_ALLOWEDORIGIN:-*}"
      NEXUSTALE_SERVER_REGISTRATIONOPEN: "${NEXUSTALE_REGISTRATIONOPEN:-true}"
      NEXUSTALE_DB_URL: "postgres://nexustale:${NEXUSTALE_DB_PASSWORD}@postgres:5432/nexustale?sslmode=disable"
      NEXUSTALE_DB_MIGRATIONSPATH: "file:///migrations"
      NEXUSTALE_AUTH_JWTSECRET: "${NEXUSTALE_JWT_SECRET}"
      NEXUSTALE_ENCRYPTION_KEY: "${NEXUSTALE_ENCRYPTION_KEY}"
      NEXUSTALE_REDIS_URL: "redis://redis:6379"
      NEXUSTALE_MINIO_ENDPOINT: "minio:9000"
      NEXUSTALE_MINIO_ACCESSKEY: "${NEXUSTALE_MINIO_ACCESSKEY}"
      NEXUSTALE_MINIO_SECRETKEY: "${NEXUSTALE_MINIO_SECRETKEY}"
      NEXUSTALE_MINIO_BUCKET: "nexustale"
      NEXUSTALE_MINIO_USESSL: "false"
      NEXUSTALE_GIT_REPOSPATH: "/data/repos"
      # Only needed if you run Ollama on the host (not in Docker); reached
      # via host.docker.internal, mapped below. Ignore if you use a cloud
      # AI provider key instead (set per-user, in-app, under Settings).
      NEXUSTALE_AI_OLLAMAURL: "${NEXUSTALE_OLLAMA_URL:-http://host.docker.internal:11434}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - git-repos:/data/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    image: ghcr.io/helloworld44-89/nexustale/frontend:${NEXUSTALE_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${NEXUSTALE_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  minio-data:
  git-repos:
