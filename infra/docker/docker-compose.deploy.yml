# Deployment compose file for the dev VM.
# Uses pre-built images from GHCR rather than building from source.
# The Ansible playbook writes a .env file alongside this file before running it.
#
# Required env vars (from .env):
#   IMAGE_TAG                      — git sha or "dev"
#   NEXUSTALE_SERVER_MODE          — "release" in prod (set by Ansible)
#   NEXUSTALE_AUTH_JWTSECRET       — JWT signing secret
#   NEXUSTALE_ENCRYPTION_KEY       — 64 hex chars (AES-256-GCM key for API keys)
#   NEXUSTALE_DB_PASSWORD          — Postgres password
#   NEXUSTALE_MINIO_ACCESSKEY      — MinIO root user
#   NEXUSTALE_MINIO_SECRETKEY      — MinIO root password

# Shared log rotation config applied to every service.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: nexustale
      POSTGRES_PASSWORD: ${NEXUSTALE_DB_PASSWORD}
      POSTGRES_DB: nexustale
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexustale"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${NEXUSTALE_MINIO_ACCESSKEY}
      MINIO_ROOT_PASSWORD: ${NEXUSTALE_MINIO_SECRETKEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    image: ghcr.io/helloworld44-89/nexustale/api:${IMAGE_TAG:-dev}
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8080:8080"
    environment:
      NEXUSTALE_SERVER_PORT: "8080"
      NEXUSTALE_SERVER_MODE: "${NEXUSTALE_SERVER_MODE}"
      NEXUSTALE_SERVER_ALLOWEDORIGIN: "${NEXUSTALE_SERVER_ALLOWEDORIGIN}"
      NEXUSTALE_SERVER_REGISTRATIONOPEN: "${NEXUSTALE_SERVER_REGISTRATIONOPEN:-false}"
      NEXUSTALE_DB_URL: "postgres://nexustale:${NEXUSTALE_DB_PASSWORD}@postgres:5432/nexustale?sslmode=disable"
      NEXUSTALE_DB_MIGRATIONSPATH: "file:///migrations"
      NEXUSTALE_DB_MAXCONNS: "10"
      NEXUSTALE_DB_MINCONNS: "2"
      NEXUSTALE_AUTH_JWTSECRET: "${NEXUSTALE_AUTH_JWTSECRET}"
      NEXUSTALE_ENCRYPTION_KEY: "${NEXUSTALE_ENCRYPTION_KEY}"
      NEXUSTALE_AUTH_ACCESSTOKENEXPIRY: "15m"
      NEXUSTALE_AUTH_REFRESHTOKENEXPIRY: "168h"
      NEXUSTALE_AUTH_BCRYPTCOST: "12"
      NEXUSTALE_REDIS_URL: "redis://redis:6379"
      NEXUSTALE_MINIO_ENDPOINT: "minio:9000"
      NEXUSTALE_MINIO_ACCESSKEY: "${NEXUSTALE_MINIO_ACCESSKEY}"
      NEXUSTALE_MINIO_SECRETKEY: "${NEXUSTALE_MINIO_SECRETKEY}"
      NEXUSTALE_MINIO_BUCKET: "nexustale"
      NEXUSTALE_MINIO_USESSL: "false"
      NEXUSTALE_GIT_REPOSPATH: "/data/repos"
    volumes:
      - git-repos:/data/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    image: ghcr.io/helloworld44-89/nexustale/frontend:${IMAGE_TAG:-dev}
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # TLS certs from certbot on the host (read-only).
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # SSL nginx config templated by Ansible with the actual domain.
      - ./nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  minio-data:
  git-repos:
