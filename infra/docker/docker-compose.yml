services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexustale
      POSTGRES_PASSWORD: nexustale
      POSTGRES_DB: nexustale
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexustale"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Application ───────────────────────────────────────────────────────────────

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    expose:
      - "8080"
    environment:
      NEXUSTALE_SERVER_PORT: "8080"
      NEXUSTALE_SERVER_MODE: "${NEXUSTALE_SERVER_MODE:-debug}"
      NEXUSTALE_DB_URL: "postgres://nexustale:nexustale@postgres:5432/nexustale?sslmode=disable"
      NEXUSTALE_DB_MIGRATIONSPATH: "file:///migrations"
      NEXUSTALE_DB_MAXCONNS: "10"
      NEXUSTALE_DB_MINCONNS: "2"
      NEXUSTALE_AUTH_JWTSECRET: "${NEXUSTALE_AUTH_JWTSECRET:-dev-secret-change-in-production}"
      NEXUSTALE_AUTH_ACCESSTOKENEXPIRY: "${NEXUSTALE_AUTH_ACCESSTOKENEXPIRY:-15m}"
      NEXUSTALE_AUTH_REFRESHTOKENEXPIRY: "${NEXUSTALE_AUTH_REFRESHTOKENEXPIRY:-168h}"
      NEXUSTALE_AUTH_BCRYPTCOST: "${NEXUSTALE_AUTH_BCRYPTCOST:-12}"
      NEXUSTALE_REDIS_URL: "redis://redis:6379"
      NEXUSTALE_MINIO_ENDPOINT: "minio:9000"
      NEXUSTALE_MINIO_ACCESSKEY: "minioadmin"
      NEXUSTALE_MINIO_SECRETKEY: "minioadmin"
      NEXUSTALE_MINIO_BUCKET: "nexustale"
      NEXUSTALE_MINIO_USESSL: "false"
      NEXUSTALE_GIT_REPOSPATH: "/data/repos"
    volumes:
      - git-repos:/data/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
  git-repos:
