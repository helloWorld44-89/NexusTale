version: "2"
sql:
  - engine: "postgresql"
    queries: "pkg/db/queries"
    schema: "pkg/db/migrations"
    gen:
      go:
        package: "sqlcgen"
        out: "pkg/db/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "text[]"
            go_type:
              type: "[]string"
          - db_type: "pg_catalog.varchar[]"
            go_type:
              type: "[]string"
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
