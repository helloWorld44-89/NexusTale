            application/json:
              schema: { $ref: '#/components/schemas/CanonizeResult' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409":
          description: Paradox — histories have diverged; manual resolution required.
          content:
