openapi: 3.1.0

info:
  title: NexusTale API
  version: "1.0.0"
  description: >
    REST API for NexusTale — a sci-fi/fantasy novel-writing platform with
    Git-backed versioning, world wiki, and AI co-author support.

servers:
  - url: /api/v1
    description: Current API prefix (served by nginx reverse-proxy in all environments)

security: []  # default unauthenticated; individual operations override via bearerAuth

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── Reusable error shapes ───────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid JWT.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    BadRequest:
      description: Validation or binding error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:

    # ── Shared ────────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        message: { type: string }
        detail:  { type: string }

    MessageResponse:
      type: object
      required: [message]
      properties:
        message: { type: string }

    # ── Auth ──────────────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [email, display_name, password]
      properties:
        email:        { type: string, format: email }
        display_name: { type: string, minLength: 2, maxLength: 100 }
        password:     { type: string, minLength: 8, maxLength: 128 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string }

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    TokenPair:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:  { type: string }
        refresh_token: { type: string }

    UserResponse:
      type: object
      required: [id, email, display_name, role, plan, created_at]
      properties:
        id:           { type: string, format: uuid }
        email:        { type: string, format: email }
        display_name: { type: string }
        role:         { type: string, enum: [viewer, author, admin] }
        plan:         { type: string, enum: [free, scribe, chronicler, studio] }
        created_at:   { type: string, format: date-time }

    AuthResponse:
      type: object
      required: [user, tokens]
      properties:
        user:   { $ref: '#/components/schemas/UserResponse' }
        tokens: { $ref: '#/components/schemas/TokenPair' }

    # ── Projects ──────────────────────────────────────────────────────────────
    CreateProjectRequest:
      type: object
      required: [title]
      properties:
        title:       { type: string, minLength: 1, maxLength: 200 }
        description: { type: string }
        genres:      { type: array, items: { type: string } }

    UpdateProjectRequest:
      type: object
      properties:
        title:       { type: string, minLength: 1, maxLength: 200 }
        description: { type: string }

    ProjectResponse:
      type: object
      required: [id, owner_id, title, description, genres, archived, phase, auto_tag_enabled, created_at, updated_at]
      properties:
        id:               { type: string, format: uuid }
        owner_id:         { type: string, format: uuid }
        title:            { type: string }
        description:      { type: string }
        genres:           { type: array, items: { type: string } }
        archived:         { type: boolean }
        phase:            { type: string }
        auto_tag_enabled: { type: boolean }
        created_at:       { type: string, format: date-time }
        updated_at:       { type: string, format: date-time }

    ProjectStats:
      type: object
      required: [scene_count, chapter_count, total_word_count, last_updated_at]
      properties:
        scene_count:      { type: integer }
        chapter_count:    { type: integer }
        total_word_count: { type: integer }
        last_updated_at:  { type: string, format: date-time }

    # ── Acts ──────────────────────────────────────────────────────────────────
    CreateActRequest:
      type: object
      required: [title]
      properties:
        title:      { type: string, minLength: 1, maxLength: 200 }
        summary:    { type: string }
        sort_order: { type: integer }

    UpdateActRequest:
      type: object
      properties:
        title:      { type: string, minLength: 1, maxLength: 200 }
        summary:    { type: string }
        sort_order: { type: integer }

    ActResponse:
      type: object
      required: [id, project_id, title, summary, sort_order, created_at, updated_at]
      properties:
        id:         { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        title:      { type: string }
        summary:    { type: string }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ── Chapters ──────────────────────────────────────────────────────────────
    CreateChapterRequest:
      type: object
      required: [title]
      properties:
        title:      { type: string, minLength: 1, maxLength: 200 }
        summary:    { type: string }
        sort_order: { type: integer }

    UpdateChapterRequest:
      type: object
      properties:
        title:      { type: string, minLength: 1, maxLength: 200 }
        summary:    { type: string }
        sort_order: { type: integer }

    ChapterResponse:
      type: object
      required: [id, project_id, act_id, title, summary, sort_order, created_at, updated_at]
      properties:
        id:         { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        act_id:     { type: string, format: uuid }
        title:      { type: string }
        summary:    { type: string }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ── Scenes ────────────────────────────────────────────────────────────────
    CreateSceneRequest:
      type: object
      required: [title]
      properties:
        title:      { type: string, minLength: 1, maxLength: 200 }
        content:    { type: string }
        pov:        { type: string }
        tense:      { type: string }
        tags:       { type: array, items: { type: string } }
        summary:    { type: string }
        sort_order: { type: integer }

    UpdateSceneRequest:
      type: object
      properties:
        title:         { type: string, minLength: 1, maxLength: 200 }
        content:       { type: string }
        pov:           { type: string }
        tense:         { type: string }
        tags:          { type: array, items: { type: string } }
        summary:       { type: string }
        summary_stale: { type: boolean }
        sort_order:    { type: integer }

    SceneResponse:
      type: object
      required: [id, chapter_id, title, content, sort_order, word_count, created_at, updated_at]
      properties:
        id:            { type: string, format: uuid }
        chapter_id:    { type: string, format: uuid }
        title:         { type: string }
        content:       { type: string }
        pov:           { type: string }
        tense:         { type: string }
        tags:          { type: array, items: { type: string } }
        summary:       { type: string }
        summary_stale: { type: boolean }
        sort_order:    { type: integer }
        word_count:    { type: integer, description: "Server-computed word count; updated on every content save." }
        created_at:    { type: string, format: date-time }
        updated_at:    { type: string, format: date-time }

    # ── API Keys ──────────────────────────────────────────────────────────────
    UpsertAPIKeyRequest:
      type: object
      required: [provider, key]
      properties:
        provider: { type: string, description: "e.g. openai, anthropic, gemini, mistral, custom" }
        key:      { type: string, description: "Raw API key — encrypted at rest, never returned." }

    APIKeyResponse:
      type: object
      required: [id, provider, key_hint, created_at, updated_at]
      properties:
        id:         { type: string, format: uuid }
        provider:   { type: string }
        key_hint:   { type: string, description: "Last 4 characters of the key for display only." }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ── Git / Chronicle ───────────────────────────────────────────────────────
    ChronicleRequest:
      type: object
      required: [note]
      properties:
        note: { type: string, minLength: 1, maxLength: 500 }

    ChronicleEntry:
      type: object
      required: [sha, short_sha, note, author, created_at]
      properties:
        sha:        { type: string }
        short_sha:  { type: string }
        note:       { type: string }
        author:     { type: string }
        created_at: { type: string, format: date-time }

    # Chronicle returns 201 with ChronicleEntry on success, or 200 with this
    # shape when there was nothing new to commit.
    NothingToChronicle:
      type: object
      required: [message]
      properties:
        message:        { type: string, example: "nothing to chronicle" }
        last_chronicle: { $ref: '#/components/schemas/ChronicleEntry', nullable: true }

    TimelineInfo:
      type: object
      required: [name, is_canon, is_active, head_sha, created_at]
      properties:
        name:       { type: string }
        is_canon:   { type: boolean }
        is_active:  { type: boolean }
        head_sha:   { type: string }
        created_at: { type: string, format: date-time }

    GitStatusResponse:
      type: object
      required: [current_timeline]
      properties:
        current_timeline: { type: string }
        last_chronicle:
          $ref: '#/components/schemas/ChronicleEntry'
          nullable: true

    EchoResponse:
      type: object
      required: [from_sha, to_sha, diff]
      properties:
        from_sha: { type: string }
        to_sha:   { type: string }
        diff:     { type: string }

    DivergeRequest:
      type: object
      required: [timeline_name]
      properties:
        timeline_name: { type: string, minLength: 1, maxLength: 100 }
        from_sha:      { type: string, description: "Pin the diverge to a specific Chronicle; defaults to HEAD." }

    CanonizeResult:
      type: object
      required: [has_paradox]
      properties:
        merged_sha:   { type: string }
        has_paradox:  { type: boolean }
        paradox_note: { type: string }

    # ── Wiki — Entities ───────────────────────────────────────────────────────
    EntityType:
      type: string
      enum: [character, location, faction, item, concept, lore]

    CreateEntityRequest:
      type: object
      required: [type, name]
      properties:
        type:             { $ref: '#/components/schemas/EntityType' }
        name:             { type: string, minLength: 1, maxLength: 200 }
        summary:          { type: string }
        attributes:       { type: object, additionalProperties: { type: string } }
        parent_entity_id: { type: string, format: uuid }

    UpdateEntityRequest:
      type: object
      properties:
        name:       { type: string, minLength: 1, maxLength: 200 }
        summary:    { type: string }
        attributes: { type: object, additionalProperties: { type: string } }

    EntityResponse:
      type: object
      required: [id, project_id, type, name, summary, attributes, created_at, updated_at]
      properties:
        id:               { type: string, format: uuid }
        project_id:       { type: string, format: uuid }
        parent_entity_id: { type: string, format: uuid, nullable: true }
        type:             { $ref: '#/components/schemas/EntityType' }
        name:             { type: string }
        summary:          { type: string }
        attributes:       { type: object, additionalProperties: { type: string } }
        image_url:        { type: string, nullable: true, description: "Presigned MinIO URL valid for ~4 hours; absent when no image is stored." }
        created_at:       { type: string, format: date-time }
        updated_at:       { type: string, format: date-time }
        rename_cascade_available: { type: boolean, description: "Set when a name change has ≥1 scene mention. Triggers cascade banner in UI." }
        occurrence_count:         { type: integer, description: "Total non-suppressed mentions of the old name." }
        old_name:                 { type: string, description: "Previous name before the update; only set when rename_cascade_available is true." }

    # ── Wiki — Relationships ──────────────────────────────────────────────────
    CreateRelationshipRequest:
      type: object
      required: [from_entity_id, to_entity_id, type]
      properties:
        from_entity_id: { type: string, format: uuid }
        to_entity_id:   { type: string, format: uuid }
        type:           { type: string, description: "e.g. 'allied_with', 'enemy_of', 'parent_of'" }
        description:    { type: string }

    RelationshipResponse:
      type: object
      required: [id, project_id, from_entity_id, to_entity_id, type, created_at]
      properties:
        id:             { type: string, format: uuid }
        project_id:     { type: string, format: uuid }
        from_entity_id: { type: string, format: uuid }
        to_entity_id:   { type: string, format: uuid }
        type:           { type: string }
        description:    { type: string }
        created_at:     { type: string, format: date-time }

    WikiGraphResponse:
      type: object
      required: [entities, relationships]
      properties:
        entities:      { type: array, items: { $ref: '#/components/schemas/EntityResponse' } }
        relationships: { type: array, items: { $ref: '#/components/schemas/RelationshipResponse' } }

    # ── Wiki — Magic Rules ────────────────────────────────────────────────────
    CreateMagicRuleRequest:
      type: object
      required: [name]
      properties:
        name:        { type: string, minLength: 1, maxLength: 200 }
        description: { type: string }

    UpdateMagicRuleRequest:
      type: object
      properties:
        name:        { type: string, minLength: 1, maxLength: 200 }
        description: { type: string }

    MagicRuleResponse:
      type: object
      required: [id, project_id, name, description, created_at, updated_at]
      properties:
        id:          { type: string, format: uuid }
        project_id:  { type: string, format: uuid }
        name:        { type: string }
        description: { type: string }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    # ── Wiki — Timeline ───────────────────────────────────────────────────────
    CreateTimelineEventRequest:
      type: object
      required: [name]
      properties:
        name:               { type: string, minLength: 1, maxLength: 200 }
        description:        { type: string }
        entity_id:          { type: string, format: uuid, description: "Optional entity this event is anchored to." }
        era:                { type: string }
        year:               { type: integer, nullable: true }
        month:              { type: integer, nullable: true }
        day:                { type: integer, nullable: true }
        anchor_event_id:    { type: string, format: uuid, nullable: true, description: "Mutually exclusive with year/month/day." }
        anchor_offset_year: { type: integer, nullable: true }
        anchor_offset_month: { type: integer, nullable: true }
        anchor_offset_day:  { type: integer, nullable: true }

    UpdateTimelineEventRequest:
      type: object
      properties:
        name:        { type: string, minLength: 1, maxLength: 200 }
        description: { type: string }
        era:         { type: string }
        year:        { type: integer, nullable: true }
        month:       { type: integer, nullable: true }
        day:         { type: integer, nullable: true }

    TimelineEventResponse:
      type: object
      required: [id, project_id, name, description, era, created_at, updated_at]
      properties:
        id:                 { type: string, format: uuid }
        project_id:         { type: string, format: uuid }
        entity_id:          { type: string, format: uuid, nullable: true }
        name:               { type: string }
        description:        { type: string }
        era:                { type: string }
        year:               { type: integer, nullable: true }
        month:              { type: integer, nullable: true }
        day:                { type: integer, nullable: true }
        anchor_event_id:    { type: string, format: uuid, nullable: true }
        anchor_offset_year: { type: integer, nullable: true }
        anchor_offset_month: { type: integer, nullable: true }
        anchor_offset_day:  { type: integer, nullable: true }
        created_at:         { type: string, format: date-time }
        updated_at:         { type: string, format: date-time }

    # ── Wiki — Autolink ───────────────────────────────────────────────────────
    AutolinkRequest:
      type: object
      required: [text]
      properties:
        text: { type: string }

    AutolinkMatch:
      type: object
      required: [entity_id, entity_name, start, end]
      properties:
        entity_id:   { type: string, format: uuid }
        entity_name: { type: string }
        start:       { type: integer }
        end:         { type: integer }

    # ── Novel structures ──────────────────────────────────────────────────────

    StructurePhase:
      type: object
      required: [name, description, hints]
      properties:
        name:        { type: string }
        description: { type: string }
        hints:       { type: string }

    NovelStructureResponse:
      type: object
      required: [id, name, description, phases, strengths, risks]
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        description: { type: string }
        phases:
          type: array
          items: { $ref: '#/components/schemas/StructurePhase' }
        strengths:   { type: string }
        risks:       { type: string }

    StructureScoreRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    StructureScoreEntry:
      type: object
      required: [structure_id, name, score, is_secondary]
      properties:
        structure_id: { type: string, format: uuid }
        name:         { type: string }
        score:        { type: integer }
        is_secondary: { type: boolean }

    StructureScoreResponse:
      type: object
      required: [ranked]
      properties:
        ranked:
          type: array
          items: { $ref: '#/components/schemas/StructureScoreEntry' }

    ProjectStructureResponse:
      type: object
      properties:
        structure_id:
          type: string
          format: uuid
          nullable: true
        structure_name:
          type: string
          nullable: true
        phases:
          type: array
          items: { $ref: '#/components/schemas/StructurePhase' }
          nullable: true
        structure_custom:
          type: object
          nullable: true

    UpdateProjectStructureRequest:
      type: object
      properties:
        structure_id:
          type: string
          format: uuid
          nullable: true
        structure_custom:
          type: object
          nullable: true

    # ── Guide ─────────────────────────────────────────────────────────────────
    GuideStepKey:
      type: string
      enum: [premise, characters, world, outline, first_scene]

    GuideStepResponse:
      type: object
      required: [step, completed]
      properties:
        step:      { $ref: '#/components/schemas/GuideStepKey' }
        data:      { type: object, nullable: true }
        completed: { type: boolean }

    GuideProgressResponse:
      type: object
      required: [steps]
      properties:
        steps:
          type: array
          items: { $ref: '#/components/schemas/GuideStepResponse' }

    SaveGuideStepRequest:
      type: object
      properties:
        data: { type: object }

    AIInstructionsResponse:
      type: object
      required: [ai_instructions]
      properties:
        ai_instructions: { type: string }

    UpdateAIInstructionsRequest:
      type: object
      required: [ai_instructions]
      properties:
        ai_instructions: { type: string }

    # ── Prompts ───────────────────────────────────────────────────────────────
    PromptCategory:
      type: string
      enum: [style, voice, workshop, system]

    CreatePromptRequest:
      type: object
      required: [name, content]
      properties:
        name:     { type: string }
        content:  { type: string }
        category: { $ref: '#/components/schemas/PromptCategory' }

    UpdatePromptRequest:
      type: object
      properties:
        name:     { type: string }
        content:  { type: string }
        category: { $ref: '#/components/schemas/PromptCategory' }

    PromptResponse:
      type: object
      required: [id, project_id, name, content, category, created_at, updated_at]
      properties:
        id:         { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        name:       { type: string }
        content:    { type: string }
        category:   { $ref: '#/components/schemas/PromptCategory' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ── Export ────────────────────────────────────────────────────────────────
    ExportFormat:
      type: string
      enum: [markdown, epub, docx]

    ExportRequest:
      type: object
      required: [format]
      properties:
        format: { $ref: '#/components/schemas/ExportFormat' }

    ExportJobStatus:
      type: string
      enum: [pending, processing, done, failed]

    ExportJobResponse:
      type: object
      required: [id, project_id, user_id, format, status, created_at, updated_at]
      properties:
        id:          { type: string, format: uuid }
        project_id:  { type: string, format: uuid }
        user_id:     { type: string, format: uuid }
        format:      { $ref: '#/components/schemas/ExportFormat' }
        status:      { $ref: '#/components/schemas/ExportJobStatus' }
        download_url: { type: string, nullable: true }
        error_msg:   { type: string, nullable: true }
        expires_at:  { type: string, format: date-time, nullable: true }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    ExportEnqueueResponse:
      type: object
      required: [job_id]
      properties:
        job_id: { type: string, format: uuid }

    # ── AI ────────────────────────────────────────────────────────────────────
    CompleteMode:
      type: string
      enum: [continue, beat]

    CompleteRequest:
      type: object
      properties:
        scene_id:    { type: string, format: uuid }
        mode:        { $ref: '#/components/schemas/CompleteMode' }
        beat:        { type: string, description: "Required when mode=beat" }
        instruction: { type: string }
        provider:    { type: string }
        max_tokens:  { type: integer }
        prompt_id:   { type: string, format: uuid }

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:    { type: string, enum: [user, assistant, system] }
        content: { type: string }

    ChatRequest:
      type: object
      required: [messages]
      properties:
        scene_id:   { type: string, format: uuid }
        messages:   { type: array, items: { $ref: '#/components/schemas/ChatMessage' } }
        provider:   { type: string }
        max_tokens: { type: integer }

    SummarizeRequest:
      type: object
      properties:
        text:     { type: string }
        scene_id: { type: string, format: uuid }
        provider: { type: string }

    SummarizeResponse:
      type: object
      required: [summary]
      properties:
        summary: { type: string }

    AIUsageResponse:
      type: object
      required: [total_calls, total_cost_usd, total_tokens]
      properties:
        total_calls:     { type: integer }
        total_cost_usd:  { type: number, format: double }
        total_tokens:    { type: integer }
        calls_by_provider:
          type: object
          additionalProperties: { type: integer }

    BeatHistoryEntry:
      type: object
      required: [beat_text, mode, created_at]
      properties:
        beat_text:  { type: string }
        mode:       { type: string }
        scene_id:   { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }

    ChapterSummaryResponse:
      type: object
      required: [chapter_id]
      properties:
        chapter_id: { type: string, format: uuid }
        summary:    { type: string, nullable: true }
        branch:     { type: string, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    TestConnectionResponse:
      type: object
      required: [ok]
      properties:
        ok:      { type: boolean }
        message: { type: string }

    ContextPinType:
      type: string
      enum: [entity, chapter, scene, note]

    ContextPinMode:
      type: string
      enum: [summary, full]

    CreateContextPinRequest:
      type: object
      required: [pin_type, ref_id]
      properties:
        pin_type: { $ref: '#/components/schemas/ContextPinType' }
        ref_id:   { type: string, format: uuid }
        mode:     { $ref: '#/components/schemas/ContextPinMode' }

    ContextPinResponse:
      type: object
      required: [id, project_id, user_id, pin_type, ref_id, mode, created_at]
      properties:
        id:         { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        user_id:    { type: string, format: uuid }
        pin_type:   { $ref: '#/components/schemas/ContextPinType' }
        ref_id:     { type: string, format: uuid }
        mode:       { $ref: '#/components/schemas/ContextPinMode' }
        label:      { type: string }
        created_at: { type: string, format: date-time }

    # ── Workshop ──────────────────────────────────────────────────────────────
    WorkshopMessage:
      type: object
      required: [role, content]
      properties:
        role:    { type: string, enum: [user, assistant] }
        content: { type: string }

    WorkshopSession:
      type: object
      required: [id, project_id, title, messages, created_at, updated_at]
      properties:
        id:         { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        title:      { type: string }
        messages:
          type: array
          items: { $ref: '#/components/schemas/WorkshopMessage' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateWorkshopSessionRequest:
      type: object
      properties:
        title: { type: string }

    UpdateWorkshopSessionRequest:
      type: object
      properties:
        title: { type: string }

    WorkshopChatRequest:
      type: object
      required: [message]
      properties:
        message:       { type: string }
        tools_enabled: { type: boolean }
        max_rounds:    { type: integer }

    # ── Research notes ────────────────────────────────────────────────────────
    CreateResearchNoteRequest:
      type: object
      required: [title]
      properties:
        title:      { type: string }
        body:       { type: string }
        source_url: { type: string }
        tags:       { type: array, items: { type: string } }

    UpdateResearchNoteRequest:
      type: object
      properties:
        title:      { type: string }
        body:       { type: string }
        source_url: { type: string }
        tags:       { type: array, items: { type: string } }

    ResearchNoteResponse:
      type: object
      required: [id, project_id, title, created_at, updated_at]
      properties:
        id:         { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        title:      { type: string }
        body:       { type: string, nullable: true }
        source_url: { type: string, nullable: true }
        tags:       { type: array, items: { type: string } }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ── Collaboration ─────────────────────────────────────────────────────────
    CollaboratorRole:
      type: string
      enum: [coauthor, editor, reviewer]

    InviteCollaboratorRequest:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email }
        role:  { $ref: '#/components/schemas/CollaboratorRole' }

    InvitePreviewResponse:
      type: object
      required: [project_title, invited_by, role]
      properties:
        project_title: { type: string }
        invited_by:    { type: string }
        role:          { $ref: '#/components/schemas/CollaboratorRole' }

    PendingInviteResponse:
      type: object
      required: [id, project_id, email, role, expires_at, created_at]
      properties:
        id:         { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        email:      { type: string }
        role:       { $ref: '#/components/schemas/CollaboratorRole' }
        expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    CollaboratorResponse:
      type: object
      required: [user_id, display_name, email, role, joined_at]
      properties:
        user_id:      { type: string, format: uuid }
        display_name: { type: string }
        email:        { type: string }
        role:         { $ref: '#/components/schemas/CollaboratorRole' }
        branch_name:  { type: string }
        joined_at:    { type: string, format: date-time }

    # ── Merge requests ────────────────────────────────────────────────────────
    MRStatus:
      type: string
      enum: [open, merged, rejected]

    OpenMergeRequestRequest:
      type: object
      required: [title, from_branch, to_branch]
      properties:
        title:       { type: string }
        description: { type: string }
        from_branch: { type: string }
        to_branch:   { type: string }

    ResolveMergeRequestRequest:
      type: object
      required: [action]
      properties:
        action: { type: string, enum: [merge, reject] }

    MergeRequestResponse:
      type: object
      required: [id, project_id, title, from_branch, to_branch, status, created_at, updated_at]
      properties:
        id:             { type: string, format: uuid }
        project_id:     { type: string, format: uuid }
        title:          { type: string }
        description:    { type: string, nullable: true }
        from_branch:    { type: string }
        to_branch:      { type: string }
        status:         { $ref: '#/components/schemas/MRStatus' }
        requester_name: { type: string, nullable: true }
        merged_sha:     { type: string, nullable: true }
        created_at:     { type: string, format: date-time }
        updated_at:     { type: string, format: date-time }

    SceneDiff:
      type: object
      required: [scene_id, scene_title, diff]
      properties:
        scene_id:    { type: string, format: uuid }
        scene_title: { type: string }
        diff:        { type: string, description: Unified diff text }

    MRDiffResponse:
      type: object
      required: [merge_request_id, scene_diffs]
      properties:
        merge_request_id: { type: string, format: uuid }
        scene_diffs:
          type: array
          items: { $ref: '#/components/schemas/SceneDiff' }

    # ── Notifications ─────────────────────────────────────────────────────────
    NotificationType:
      type: string
      enum: [mr_opened, mr_merged, mr_rejected, invite_accepted, collab_removed]

    NotificationResponse:
      type: object
      required: [id, user_id, type, read, created_at]
      properties:
        id:         { type: string, format: uuid }
        user_id:    { type: string, format: uuid }
        type:       { $ref: '#/components/schemas/NotificationType' }
        payload:    { type: object, nullable: true }
        read:       { type: boolean }
        created_at: { type: string, format: date-time }

    # ── Annotations ───────────────────────────────────────────────────────────
    AnnotationType:
      type: string
      enum: [note, suggestion, question]

    CreateAnnotationRequest:
      type: object
      required: [body, annotation_type, anchor_start, anchor_end]
      properties:
        body:            { type: string }
        annotation_type: { $ref: '#/components/schemas/AnnotationType' }
        anchor_start:    { type: integer }
        anchor_end:      { type: integer }

    UpdateAnnotationRequest:
      type: object
      properties:
        body:     { type: string }
        resolved: { type: boolean }

    AnnotationResponse:
      type: object
      required: [id, scene_id, author_id, body, annotation_type, anchor_start, anchor_end, resolved, created_at]
      properties:
        id:              { type: string, format: uuid }
        scene_id:        { type: string, format: uuid }
        project_id:      { type: string, format: uuid }
        author_id:       { type: string, format: uuid }
        author_name:     { type: string }
        body:            { type: string }
        annotation_type: { $ref: '#/components/schemas/AnnotationType' }
        anchor_start:    { type: integer }
        anchor_end:      { type: integer }
        resolved:        { type: boolean }
        resolved_by:     { type: string, format: uuid, nullable: true }
        created_at:      { type: string, format: date-time }
        updated_at:      { type: string, format: date-time }

# ═══════════════════════════════════════════════════════════════════════════════
# Paths
# ═══════════════════════════════════════════════════════════════════════════════

paths:

  # ── Auth ────────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      operationId: authRegister
      summary: Register a new user account
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "500": { $ref: '#/components/responses/InternalError' }

  /auth/login:
    post:
      operationId: authLogin
      summary: Log in and receive tokens
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      operationId: authRefresh
      summary: Rotate refresh token and issue new token pair
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        "200":
          description: New token pair issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenPair' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      operationId: authLogout
      summary: Revoke the refresh token
      tags: [auth]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LogoutRequest' }
      responses:
        "200":
          description: Logged out.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  # ── Projects ─────────────────────────────────────────────────────────────────

  /projects:
    get:
      operationId: listProjects
      summary: List all projects owned by the authenticated user
      tags: [projects]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of projects.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ProjectResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createProject
      summary: Create a new project
      tags: [projects]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateProjectRequest' }
      responses:
        "201":
          description: Project created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /projects/{projectId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getProject
      summary: Get a single project
      tags: [projects]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Project details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateProject
      summary: Update project title or description
      tags: [projects]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProjectRequest' }
      responses:
        "200":
          description: Updated project.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteProject
      summary: Delete a project
      tags: [projects]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Project deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /projects/{projectId}/stats:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get project stats
      tags: [Projects]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Project statistics
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectStats' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Acts ─────────────────────────────────────────────────────────────────────

  /projects/{projectId}/acts:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listActs
      summary: List all acts in a project
      tags: [acts]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of acts.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ActResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    post:
      operationId: createAct
      summary: Create a new act
      tags: [acts]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateActRequest' }
      responses:
        "201":
          description: Act created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /projects/{projectId}/acts/{actId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: actId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getAct
      summary: Get a single act
      tags: [acts]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Act details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateAct
      summary: Update an act
      tags: [acts]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateActRequest' }
      responses:
        "200":
          description: Updated act.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteAct
      summary: Delete an act and all its chapters and scenes
      tags: [acts]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Act deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Chapters ─────────────────────────────────────────────────────────────────

  /projects/{projectId}/acts/{actId}/chapters:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: actId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listChapters
      summary: List all chapters in an act
      tags: [chapters]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of chapters.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ChapterResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    post:
      operationId: createChapter
      summary: Create a new chapter in an act
      tags: [chapters]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateChapterRequest' }
      responses:
        "201":
          description: Chapter created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChapterResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /projects/{projectId}/acts/{actId}/chapters/{chapterId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: actId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: chapterId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getChapter
      summary: Get a single chapter
      tags: [chapters]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Chapter details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChapterResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateChapter
      summary: Update a chapter
      tags: [chapters]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateChapterRequest' }
      responses:
        "200":
          description: Updated chapter.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChapterResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteChapter
      summary: Delete a chapter and all its scenes
      tags: [chapters]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Chapter deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Scenes ────────────────────────────────────────────────────────────────────

  /chapters/{chapterId}/scenes:
    parameters:
      - name: chapterId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listScenes
      summary: List all scenes in a chapter
      tags: [scenes]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of scenes.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SceneResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    post:
      operationId: createScene
      summary: Create a new scene
      tags: [scenes]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSceneRequest' }
      responses:
        "201":
          description: Scene created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SceneResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /chapters/{chapterId}/scenes/{sceneId}:
    parameters:
      - name: chapterId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: sceneId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getScene
      summary: Get a single scene
      tags: [scenes]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Scene details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SceneResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: updateScene
      summary: Update a scene (partial — send only changed fields)
      tags: [scenes]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSceneRequest' }
      responses:
        "200":
          description: Updated scene.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SceneResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteScene
      summary: Delete a scene
      tags: [scenes]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Scene deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Git / Chronicle ───────────────────────────────────────────────────────────

  /projects/{projectId}/git/status:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: gitStatus
      summary: Current timeline and most recent Chronicle
      tags: [git]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Git status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GitStatusResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /projects/{projectId}/git/chronicle:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: chronicle
      summary: >
        Snapshot all scene content and create a commit (Chronicle) on the
        current Timeline. Returns 201 with the entry on success, or 200 with
        a "nothing to chronicle" message when nothing changed.
      tags: [git]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChronicleRequest' }
      responses:
        "201":
          description: Chronicle created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChronicleEntry' }
        "200":
          description: Nothing to chronicle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NothingToChronicle' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /projects/{projectId}/git/lore:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: page
        in: query
        schema: { type: integer, default: 1, minimum: 1 }
      - name: per_page
        in: query
        schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    get:
      operationId: lore
      summary: Paginated Chronicle history (git log) for the current Timeline
      tags: [git]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Chronicle entries, most recent first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ChronicleEntry' }
