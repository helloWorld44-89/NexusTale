  # ── Git / Chronicle ───────────────────────────────────────────────────────────

  /projects/{projectId}/git/status:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: gitStatus
      summary: Current timeline and most recent Chronicle
      tags: [git]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Git status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GitStatusResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /projects/{projectId}/git/chronicle:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: chronicle
      summary: >
        Snapshot all scene content and create a commit (Chronicle) on the
        current Timeline. Returns 201 with the entry on success, or 200 with
        a "nothing to chronicle" message when nothing changed.
      tags: [git]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChronicleRequest' }
      responses:
        "201":
          description: Chronicle created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChronicleEntry' }
        "200":
          description: Nothing to chronicle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NothingToChronicle' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /projects/{projectId}/git/lore:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: page
        in: query
        schema: { type: integer, default: 1, minimum: 1 }
      - name: per_page
        in: query
        schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    get:
      operationId: lore
      summary: Paginated Chronicle history (git log) for the current Timeline
      tags: [git]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Chronicle entries, most recent first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ChronicleEntry' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /projects/{projectId}/git/echo:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: from
        in: query
        required: true
        schema: { type: string, description: "Source Chronicle SHA" }
      - name: to
        in: query
        required: true
        schema: { type: string, description: "Target Chronicle SHA" }
    get:
      operationId: echo
      summary: Unified diff between two Chronicle SHAs
      tags: [git]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Diff between the two SHAs.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EchoResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /projects/{projectId}/git/timelines:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listTimelines
      summary: List all Timelines (branches) in the project
      tags: [git]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of timelines.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TimelineInfo' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    post:
      operationId: diverge
      summary: Create a new Timeline (branch) and switch to it
      tags: [git]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DivergeRequest' }
      responses:
        "201":
          description: New timeline created; returns full list of timelines.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TimelineInfo' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /projects/{projectId}/git/timelines/{timelineName}/travel:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: timelineName
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: travelTo
      summary: Switch the active Timeline (checkout branch)
      tags: [git]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Now on the requested timeline; returns updated status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GitStatusResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
        "500": { $ref: '#/components/responses/InternalError' }

  /projects/{projectId}/git/timelines/{timelineName}/canonize:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: timelineName
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: canonize
      summary: >
        Fast-forward merge a Timeline into Canon. Returns 200 on success or
        409 if the histories have diverged (a Paradox).
      tags: [git]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Timeline merged into Canon.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CanonizeResult' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409":
          description: Paradox — histories have diverged; manual resolution required.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CanonizeResult' }

