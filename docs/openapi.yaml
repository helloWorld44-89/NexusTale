        "204":
          description: Collaborator removed.
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Merge requests ────────────────────────────────────────────────────────────

  /projects/{projectId}/merge-requests:
    parameters:
      - { name: projectId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listMergeRequests
      summary: List merge requests for a project
      tags: [mergeRequests]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of merge requests.
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/MergeRequestResponse' } }
        "401": { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: openMergeRequest
      summary: Open a merge request from a collaborator branch into canon
      tags: [mergeRequests]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OpenMergeRequestRequest' }
      responses:
        "201":
          description: Opened merge request.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MergeRequestResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /projects/{projectId}/merge-requests/{mid}:
    parameters:
      - { name: projectId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: mid,       in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getMergeRequest
      summary: Get a merge request
      tags: [mergeRequests]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Merge request details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MergeRequestResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    put:
      operationId: resolveMergeRequest
      summary: Merge or reject a merge request (owner only)
      tags: [mergeRequests]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveMergeRequestRequest' }
      responses:
        "200":
          description: Updated merge request.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MergeRequestResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /projects/{projectId}/merge-requests/{mid}/diff:
    parameters:
      - { name: projectId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: mid,       in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getMergeRequestDiff
      summary: Get the per-scene diff for a merge request
      tags: [mergeRequests]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Scene-level diffs.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MRDiffResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Notifications ─────────────────────────────────────────────────────────────

  /notifications:
    get:
      operationId: listNotifications
      summary: List notifications for the authenticated user
      tags: [notifications]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of notifications.
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/NotificationResponse' } }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /notifications/read-all:
    put:
      operationId: markAllNotificationsRead
      summary: Mark all notifications as read
      tags: [notifications]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: All notifications marked read.
        "401": { $ref: '#/components/responses/Unauthorized' }

  /notifications/{notificationId}/read:
    parameters:
      - { name: notificationId, in: path, required: true, schema: { type: string, format: uuid } }
    put:
      operationId: markNotificationRead
      summary: Mark a single notification as read
      tags: [notifications]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Notification marked read.
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  # ── Annotations ───────────────────────────────────────────────────────────────

  /projects/{projectId}/scenes/{sceneId}/annotations:
    parameters:
      - { name: projectId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: sceneId,   in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listAnnotations
      summary: List annotations for a scene
      tags: [annotations]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of annotations.
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/AnnotationResponse' } }
        "401": { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createAnnotation
      summary: Create an annotation on a scene
      tags: [annotations]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAnnotationRequest' }
      responses:
        "201":
          description: Created annotation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnnotationResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }

  /projects/{projectId}/scenes/{sceneId}/annotations/{annotationId}:
    parameters:
      - { name: projectId,    in: path, required: true, schema: { type: string, format: uuid } }
      - { name: sceneId,      in: path, required: true, schema: { type: string, format: uuid } }
      - { name: annotationId, in: path, required: true, schema: { type: string, format: uuid } }
    put:
      operationId: updateAnnotation
      summary: Update an annotation body or mark it resolved
      tags: [annotations]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAnnotationRequest' }
      responses:
        "200":
          description: Updated annotation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnnotationResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteAnnotation
      summary: Delete an annotation
      tags: [annotations]
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: Annotation deleted.
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
