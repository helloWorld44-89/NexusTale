        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: from
        in: query
        required: true
        schema: { type: string, description: "Source Chronicle SHA" }
      - name: to
        in: query
        required: true
        schema: { type: string, description: "Target Chronicle SHA" }
    get:
      operationId: echo
      summary: Unified diff between two Chronicle SHAs
      tags: [git]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Diff between the two SHAs.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EchoResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }

  /projects/{projectId}/git/timelines:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listTimelines
      summary: List all Timelines (branches) in the project
      tags: [git]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of timelines.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TimelineInfo' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
    post:
      operationId: diverge
