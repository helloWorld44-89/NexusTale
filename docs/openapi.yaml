    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: timelineName
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: travelTo
      summary: Switch the active Timeline (checkout branch)
      tags: [git]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Now on the requested timeline; returns updated status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GitStatusResponse' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
        "500": { $ref: '#/components/responses/InternalError' }

  /projects/{projectId}/git/timelines/{timelineName}/canonize:
    parameters:
      - name: projectId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: timelineName
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: canonize
      summary: >
        Fast-forward merge a Timeline into Canon. Returns 200 on success or
        409 if the histories have diverged (a Paradox).
      tags: [git]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
