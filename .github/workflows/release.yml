name: Release

# Builds and pushes versioned container images to GHCR when a semver tag
# (vX.Y.Z) is pushed. This is the image self-hosters pin NEXUSTALE_VERSION
# to — distinct from the floating :alpha/:dev tags used for internal testing.
# Trigger: git tag vX.Y.Z && git push origin vX.Y.Z

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:

  build:
    name: Test, Build & Push release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: false

      - name: Run tests
        run: make test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Check API types are up to date
        working-directory: frontend
        run: |
          npm run gen:api
          git diff --exit-code src/services/api-types.ts

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Check sqlc output is up to date
        working-directory: backend
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
          sqlc generate
          git diff --exit-code pkg/db/sqlcgen/

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Version: $VERSION (tag ${GITHUB_REF_NAME})"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push API image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ env.APP_VERSION }} \
            -f infra/docker/Dockerfile.api \
            -t ghcr.io/helloworld44-89/nexustale/api:${{ github.ref_name }} \
            -t ghcr.io/helloworld44-89/nexustale/api:latest \
            .
          docker push ghcr.io/helloworld44-89/nexustale/api:${{ github.ref_name }}
          docker push ghcr.io/helloworld44-89/nexustale/api:latest

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ env.APP_VERSION }} \
            -f infra/docker/Dockerfile.frontend \
            -t ghcr.io/helloworld44-89/nexustale/frontend:${{ github.ref_name }} \
            -t ghcr.io/helloworld44-89/nexustale/frontend:latest \
            .
          docker push ghcr.io/helloworld44-89/nexustale/frontend:${{ github.ref_name }}
          docker push ghcr.io/helloworld44-89/nexustale/frontend:latest
