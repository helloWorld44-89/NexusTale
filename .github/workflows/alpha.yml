name: Alpha CI/CD

# Builds and pushes container images to GHCR on every push to master.
# No deploy step — images are tagged :alpha and :<sha> for manual/other promotion.
# Trigger: push to master, or manually via Actions → "Run workflow".

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:

  # ── Job 1: Test, Build, Push ─────────────────────────────────────────────────

  build:
    name: Test, Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: false

      - name: Run tests
        run: make test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Check API types are up to date
        working-directory: frontend
        run: |
          npm run gen:api
          git diff --exit-code src/services/api-types.ts

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Check sqlc output is up to date
        working-directory: backend
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
          sqlc generate
          git diff --exit-code pkg/db/sqlcgen/

      - name: Compute version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push API image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ env.APP_VERSION }} \
            -f infra/docker/Dockerfile.api \
            -t ghcr.io/helloworld44-89/nexustale/api:alpha \
            -t ghcr.io/helloworld44-89/nexustale/api:${{ github.sha }} \
            .
          docker push ghcr.io/helloworld44-89/nexustale/api:alpha
          docker push ghcr.io/helloworld44-89/nexustale/api:${{ github.sha }}

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ env.APP_VERSION }} \
            -f infra/docker/Dockerfile.frontend \
            -t ghcr.io/helloworld44-89/nexustale/frontend:alpha \
            -t ghcr.io/helloworld44-89/nexustale/frontend:${{ github.sha }} \
            .
          docker push ghcr.io/helloworld44-89/nexustale/frontend:alpha
          docker push ghcr.io/helloworld44-89/nexustale/frontend:${{ github.sha }}
