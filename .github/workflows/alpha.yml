name: Alpha CI/CD

# Deploys to the EC2 alpha instance.
# Trigger: push to master, or manually via Actions → "Run workflow".
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   ALPHA_VM_HOST          — EC2 public IP or domain (e.g. 12.34.56.78 or nexustale.com)
#   ALPHA_VM_USER          — SSH user on EC2 (typically "ubuntu")
#   ALPHA_SSH_KEY          — full text of your EC2 private key (.pem contents)
#   GHCR_PULL_TOKEN        — GitHub PAT with read:packages scope (same as dev)
#   ALPHA_DOMAIN           — public domain name (e.g. nexustale.com) — enables TLS
#   ALPHA_ALERT_EMAIL      — email for Let's Encrypt expiry + healthz alerts
#   ALPHA_DB_PASSWORD      — Postgres password (generate fresh, not the dev value)
#   ALPHA_JWT_SECRET       — JWT signing secret (≥32 random chars)
#   ALPHA_ENCRYPTION_KEY   — 64 hex chars: openssl rand -hex 32
#   ALPHA_MINIO_ACCESSKEY  — MinIO root user (not "minioadmin")
#   ALPHA_MINIO_SECRETKEY  — MinIO root password (not "minioadmin")

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:

  # ── Job 1: Test, Build, Push ─────────────────────────────────────────────────

  build:
    name: Test, Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: false

      - name: Run tests
        run: make test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Check API types are up to date
        working-directory: frontend
        run: |
          npm run gen:api
          git diff --exit-code src/services/api-types.ts

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Check sqlc output is up to date
        working-directory: backend
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
          sqlc generate
          git diff --exit-code pkg/db/sqlcgen/

      - name: Compute version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push API image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ env.APP_VERSION }} \
            -f infra/docker/Dockerfile.api \
            -t ghcr.io/helloworld44-89/nexustale/api:alpha \
            -t ghcr.io/helloworld44-89/nexustale/api:${{ github.sha }} \
            .
          docker push ghcr.io/helloworld44-89/nexustale/api:alpha
          docker push ghcr.io/helloworld44-89/nexustale/api:${{ github.sha }}

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ env.APP_VERSION }} \
            -f infra/docker/Dockerfile.frontend \
            -t ghcr.io/helloworld44-89/nexustale/frontend:alpha \
            -t ghcr.io/helloworld44-89/nexustale/frontend:${{ github.sha }} \
            .
          docker push ghcr.io/helloworld44-89/nexustale/frontend:alpha
          docker push ghcr.io/helloworld44-89/nexustale/frontend:${{ github.sha }}

  # ── Job 2: Deploy via Ansible ─────────────────────────────────────────────────

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install --quiet ansible

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.ALPHA_SSH_KEY }}" > ~/.ssh/alpha_deploy_key
          chmod 600 ~/.ssh/alpha_deploy_key
          ssh-keyscan -H "${{ secrets.ALPHA_VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Write Ansible vars file
        run: |
          cat > /tmp/nexustale-alpha-vars.yml << 'EOF'
          image_tag: "${{ github.sha }}"
          ghcr_token: "${{ secrets.GHCR_PULL_TOKEN }}"
          nexustale_domain: "${{ secrets.ALPHA_DOMAIN }}"
          nexustale_alert_email: "${{ secrets.ALPHA_ALERT_EMAIL }}"
          nexustale_db_password: "${{ secrets.ALPHA_DB_PASSWORD }}"
          nexustale_jwt_secret: "${{ secrets.ALPHA_JWT_SECRET }}"
          nexustale_encryption_key: "${{ secrets.ALPHA_ENCRYPTION_KEY }}"
          nexustale_minio_accesskey: "${{ secrets.ALPHA_MINIO_ACCESSKEY }}"
          nexustale_minio_secretkey: "${{ secrets.ALPHA_MINIO_SECRETKEY }}"
          EOF
          chmod 600 /tmp/nexustale-alpha-vars.yml
        # no_log equivalent: the 'EOF' heredoc is expanded before the command
        # runs; secrets are never echoed to the Actions log.

      - name: Run Ansible deploy playbook
        run: |
          ansible-playbook $GITHUB_WORKSPACE/infra/ansible/deploy-dev.yml \
            -i "${{ secrets.ALPHA_VM_HOST }}," \
            --extra-vars "dev_vm_host=${{ secrets.ALPHA_VM_HOST }}" \
            --extra-vars "dev_vm_user=${{ secrets.ALPHA_VM_USER }}" \
            --extra-vars "workspace=$GITHUB_WORKSPACE" \
            --extra-vars "@/tmp/nexustale-alpha-vars.yml" \
            --private-key ~/.ssh/alpha_deploy_key
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/nexustale-alpha-vars.yml ~/.ssh/alpha_deploy_key
