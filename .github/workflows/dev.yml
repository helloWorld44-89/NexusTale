name: Dev CI/CD

on:
  push:
    branches: [dev]

jobs:

  # ── Job 1: Test, Build, Push ────────────────────────────────────────────────
  build:
    name: Test, Build & Push
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: backend/go.sum

      - name: Run tests
        run: make test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Check API types are up to date
        working-directory: frontend
        run: |
          npm run gen:api
          git diff --exit-code src/services/api-types.ts

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Check sqlc output is up to date
        working-directory: backend
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          sqlc generate
          git diff --exit-code pkg/db/sqlcgen/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push API image
        run: |
          docker build \
            -f infra/docker/Dockerfile.api \
            -t ghcr.io/helloworld44-89/nexustale/api:dev \
            -t ghcr.io/helloworld44-89/nexustale/api:${{ github.sha }} \
            .
          docker push ghcr.io/helloworld44-89/nexustale/api:dev
          docker push ghcr.io/helloworld44-89/nexustale/api:${{ github.sha }}

      - name: Build and push frontend image
        run: |
          docker build \
            -f infra/docker/Dockerfile.frontend \
            -t ghcr.io/helloworld44-89/nexustale/frontend:dev \
            -t ghcr.io/helloworld44-89/nexustale/frontend:${{ github.sha }} \
            .
          docker push ghcr.io/helloworld44-89/nexustale/frontend:dev
          docker push ghcr.io/helloworld44-89/nexustale/frontend:${{ github.sha }}

      - name: Prune Docker images
        if: always()
        run: docker image prune -af

  # ── Job 2: Deploy via Ansible ───────────────────────────────────────────────
  deploy:
    name: Deploy to Dev VM
    needs: build
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Ansible vars file
        run: |
          cat > /tmp/nexustale-deploy-vars.yml << 'EOF'
          image_tag: "${{ github.sha }}"
          ghcr_token: "${{ secrets.GHCR_PULL_TOKEN }}"
          nexustale_db_password: "${{ secrets.NEXUSTALE_DB_PASSWORD }}"
          nexustale_jwt_secret: "${{ secrets.NEXUSTALE_JWT_SECRET }}"
          nexustale_minio_accesskey: "${{ secrets.NEXUSTALE_MINIO_ACCESSKEY }}"
          nexustale_minio_secretkey: "${{ secrets.NEXUSTALE_MINIO_SECRETKEY }}"
          EOF
          chmod 600 /tmp/nexustale-deploy-vars.yml

      - name: Run Ansible playbook
        run: |
          ansible-playbook $GITHUB_WORKSPACE/infra/ansible/deploy-dev.yml \
            -i "${{ secrets.DEV_VM_HOST }}," \
            --extra-vars "dev_vm_host=${{ secrets.DEV_VM_HOST }}" \
            --extra-vars "dev_vm_user=${{ secrets.DEV_VM_USER }}" \
            --extra-vars "workspace=$GITHUB_WORKSPACE" \
            --extra-vars "@/tmp/nexustale-deploy-vars.yml"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Clean up vars file
        if: always()
        run: rm -f /tmp/nexustale-deploy-vars.yml
